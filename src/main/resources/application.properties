spring.application.name=toy-demo

spring.datasource.url=jdbc:h2:file:./data/toydemo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# allow the H2 web console to be accessed from other hosts (useful when running in Docker)
spring.h2.console.settings.web-allow-others=true

# explicitly bind to all interfaces inside container
server.address=0.0.0.0

treasury.api.base-url=https://api.fiscaldata.treasury.gov/services/api/fiscal_service/
